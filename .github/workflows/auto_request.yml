name: Auto API Request & Snapshot

on:
  schedule:
    # Beijing Time (UTC+8) -> UTC
    - cron: "0 22 * * *"   # 06:00 BJT
    - cron: "1 3 * * *"    # 11:01 BJT
    - cron: "11 8 * * *"    # 16:02 BJT

jobs:
  api-request:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Switch to snapshot branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Create the snapshot branch if it doesn't exist yet.
          # It is based on the default branch so the snapshots/ dir keeps a single linear history.
          if git ls-remote --exit-code --heads origin snapshot; then
            git checkout snapshot
          else
            git checkout -b snapshot
            # Seed it from the current default branch checkout (code is already at HEAD)
          fi

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run API request script
        env:
          BASE_URL: ${{ secrets.BASE_URL }}
          ARK_API_KEY: ${{ secrets.ARK_API_KEY }}
          MODEL: ${{ secrets.MODEL }}
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: python main.py

      - name: Commit and push snapshot to snapshot branch
        run: |
          git add snapshots/
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: auto save API snapshot [skip ci]"
            # Best-effort fast-forward safeguard in case the branch advanced upstream
            git pull --rebase origin snapshot || true
            git push origin snapshot
          fi
